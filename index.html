<!DOCTYPE html>
<html lang="es-MX">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rutina de Ejercicio 💖</title>
    <meta name="description" content="Rutina de cuerpo completo para principiantes con temporizador de descanso, seguimiento de progreso e instrucciones detalladas de cada ejercicio.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'gym-pink': '#FF69B4',
                        'soft-pink': '#FFB6C1',
                        'blush': '#FFF5F7',
                        'pale-pink': '#FFE4E9',
                        'baby-pink': '#FFE0E9',
                        'rose-gold': '#B76E79',
                        'dark-rose': '#5C3344',
                        'mauve': '#8B5A7C',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Quicksand', sans-serif; }

        /* Transiciones suaves para expandir el video */
        .video-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease-in-out, margin-top 0.4s ease-in-out;
        }
        .video-wrapper.open {
            max-height: 500px;
            margin-top: 1rem;
        }
        .aspect-w-16 { position: relative; padding-bottom: 56.25%; }
        .aspect-w-16 iframe { position: absolute; top: 0; right: 0; bottom: 0; left: 0; width: 100%; height: 100%; }

        /* Sección de detalles expandible */
        .details-wrapper {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.5s ease-in-out;
        }
        .details-wrapper.open {
            max-height: 800px;
        }

        /* Estilo personalizado para checkbox */
        input[type="checkbox"] { accent-color: #FF69B4; }
        input[type="checkbox"]:checked + label { text-decoration: line-through; color: #9ca3af; }

        /* Gradiente de encabezado rosa */
        .header-gradient {
            background: linear-gradient(135deg, #FF69B4 0%, #FF85A1 50%, #FFB6C1 100%);
        }

        /* Barra de progreso rosa */
        .progress-fill {
            background: linear-gradient(90deg, #FF69B4 0%, #FF85A1 100%);
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.45);
        }

        /* Sombra rosada para la tarjeta principal */
        .card-shadow {
            box-shadow: 0 4px 24px rgba(255, 105, 180, 0.15);
        }

        /* Animación de destello */
        @keyframes sparkle {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.55; transform: scale(0.85); }
        }
        .sparkle { animation: sparkle 2.2s ease-in-out infinite; }

        /* Animación de pulso del temporizador */
        @keyframes pulse-pink {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255, 105, 180, 0.45); }
            50% { box-shadow: 0 0 0 8px rgba(255, 105, 180, 0); }
        }
        .timer-pulse { animation: pulse-pink 2s ease-in-out infinite; }
    </style>
</head>
<body class="min-h-screen py-6 px-4" style="background-color:#FFF5F7; color:#5C3344;">

    <div class="max-w-2xl mx-auto bg-white rounded-2xl overflow-hidden card-shadow border border-pink-100">

        <!-- Encabezado -->
        <div class="header-gradient p-6 text-white text-center relative overflow-hidden">
            <div class="absolute top-2 left-4 text-2xl sparkle opacity-75">✨</div>
            <div class="absolute top-4 right-6 text-xl sparkle opacity-65" style="animation-delay:0.6s;">💕</div>
            <div class="absolute bottom-3 left-8 text-lg opacity-55" style="animation-delay:1.1s;">🌸</div>
            <div class="absolute bottom-2 right-4 text-2xl sparkle opacity-65" style="animation-delay:1.7s;">✨</div>

            <h1 class="text-2xl font-bold tracking-wide">💖 Rutina de Cuerpo Completo</h1>
            <p class="mt-1 text-sm" style="opacity:0.92;">Amigable para principiantes • Marca conforme avances 🎀</p>

            <!-- Temporizador global -->
            <div class="mt-3 inline-flex items-center bg-white bg-opacity-20 rounded-full px-4 py-1.5 text-sm font-semibold">
                <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
                Tiempo: <span id="global-timer" class="ml-1">00:00</span>
            </div>
        </div>

        <!-- Barra de progreso -->
        <div class="p-4 border-b flex items-center justify-between" style="background:#FFF0F5; border-color:#FFD6E7;">
            <div class="w-full rounded-full h-3 mr-4 overflow-hidden" style="background:#FFD6E7;">
                <div id="progress-bar" class="progress-fill h-3 rounded-full transition-all duration-500" style="width:0%;"></div>
            </div>
            <span id="progress-text" class="text-sm font-bold whitespace-nowrap" style="color:#B76E79;">0 / 6</span>
        </div>

        <!-- Lista de ejercicios -->
        <div id="workout-list" class="divide-y" style="border-color:#FFF0F5;"></div>

        <!-- Panel del temporizador de descanso -->
        <div id="rest-timer-panel" class="hidden border-t p-5" style="background:#FFF5F7; border-color:#FFD6E7;">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold" style="color:#5C3344;">⏱️ Tiempo de Descanso</p>
                    <p class="text-xs mt-0.5" style="color:#B76E79;">Descansa antes del siguiente ejercicio</p>
                </div>
                <div class="flex items-center gap-3">
                    <!-- Indicador circular del temporizador -->
                    <div class="relative timer-pulse" style="width:64px;height:64px;">
                        <svg class="w-full h-full" style="transform:rotate(-90deg);" viewBox="0 0 64 64">
                            <circle cx="32" cy="32" r="26" fill="none" stroke="#FFD6E7" stroke-width="5"/>
                            <circle id="timer-circle-progress" cx="32" cy="32" r="26" fill="none"
                                stroke="#FF69B4" stroke-width="5"
                                stroke-dasharray="163.36" stroke-dashoffset="0"
                                style="transition: stroke-dashoffset 1s linear;"/>
                        </svg>
                        <div class="absolute inset-0 flex items-center justify-center">
                            <span id="rest-timer-display" class="text-lg font-bold" style="color:#5C3344;">60</span>
                        </div>
                    </div>
                    <!-- Controles -->
                    <div class="flex flex-col gap-2">
                        <button onclick="skipRestTimer()"
                            class="text-xs font-bold bg-white border rounded-full px-3 py-1 transition-colors"
                            style="border-color:#FFB6C1; color:#FF69B4;"
                            onmouseover="this.style.background='#FFF0F5'" onmouseout="this.style.background='white'">
                            Saltar ⏭
                        </button>
                        <button onclick="addRestTime(30)"
                            class="text-xs font-bold bg-white border rounded-full px-3 py-1 transition-colors"
                            style="border-color:#FFB6C1; color:#FF69B4;"
                            onmouseover="this.style.background='#FFF0F5'" onmouseout="this.style.background='white'">
                            +30s ➕
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Botón de reinicio -->
        <div class="p-5 text-center border-t" style="background:#FFF5F7; border-color:#FFD6E7;">
            <button onclick="resetProgress()"
                class="text-sm font-bold transition-colors"
                style="color:#B76E79;"
                onmouseover="this.style.color='#5C3344'" onmouseout="this.style.color='#B76E79'">
                🔄 Reiniciar Progreso del Ejercicio
            </button>
        </div>

    </div>

    <script>
        // Datos de ejercicios con detalles en español mexicano
        const workouts = [
            {
                id: "legpress",
                name: "Prensa de Piernas",
                sets: "3 series de 10 repeticiones",
                videoId: "nDh_BlnLCGc",
                muscles: "Cuádriceps, Glúteos, Isquiotibiales",
                difficulty: "Principiante",
                instructions: [
                    "Siéntate con la espalda recta contra el respaldo",
                    "Coloca los pies al ancho de los hombros en la plataforma",
                    "Empuja con los talones para extender las piernas",
                    "Baja con control, sin bloquear las rodillas"
                ],
                tips: "Mantén la espalda pegada al asiento y no dejes que las rodillas se junten hacia adentro."
            },
            {
                id: "latpull",
                name: "Jalones Dorsales",
                sets: "3 series de 10 repeticiones",
                videoId: "AOpi-p0cJkc",
                muscles: "Dorsal Ancho (espalda), Bíceps",
                difficulty: "Principiante",
                instructions: [
                    "Agarra la barra más ancha que el ancho de los hombros",
                    "Jala la barra hacia el pecho superior",
                    "Aprieta los omóplatos al juntar",
                    "Regresa al inicio con control"
                ],
                tips: "No te inclines demasiado hacia atrás; enfócate en jalar con la espalda, no con los brazos."
            },
            {
                id: "forwardfly",
                name: "Apertura Frontal (Pec Deck)",
                sets: "3 series de 10 repeticiones",
                videoId: "g3T7LsEeDWQ",
                muscles: "Pectorales, Deltoides Frontales",
                difficulty: "Principiante",
                instructions: [
                    "Ajusta el asiento para que las manijas queden a la altura del pecho",
                    "Junta los brazos frente al pecho",
                    "Aprieta los músculos del pecho",
                    "Regresa al inicio lentamente"
                ],
                tips: "Mantén un ligero doblez en los codos y no dejes que los brazos vayan demasiado hacia atrás."
            },
            {
                id: "goblet",
                name: "Sentadilla con Peso (Goblet)",
                sets: "3 series de 12 repeticiones",
                videoId: "9KzZD_n2r64",
                muscles: "Cuádriceps, Glúteos, Core",
                difficulty: "Principiante",
                instructions: [
                    "Sostén la mancuerna frente al pecho",
                    "Pies al ancho de los hombros",
                    "Baja las caderas por debajo de la paralela",
                    "Empuja con los talones para ponerte de pie"
                ],
                tips: "Mantén el pecho erguido, el peso en los talones y las rodillas alineadas con los pies."
            },
            {
                id: "rdl",
                name: "Peso Muerto con Mancuernas (RDL)",
                sets: "3 series de 10 repeticiones",
                videoId: "hQgFixeXdZo",
                muscles: "Isquiotibiales, Glúteos, Espalda Baja",
                difficulty: "Principiante",
                instructions: [
                    "Sostén las mancuernas frente a los muslos",
                    "Bisagra en las caderas con ligera flexión de rodilla",
                    "Baja las pesas a lo largo de las piernas",
                    "Siente el estiramiento en los isquiotibiales y regresa de pie"
                ],
                tips: "Mantén la espalda recta, empuja las caderas hacia atrás (no hacia abajo) y no redondees la espalda."
            },
            {
                id: "incline",
                name: "Caminata Inclinada",
                sets: "5 minutos",
                videoId: null,
                note: "Enfriamiento para terminar con fuerza. 💪",
                muscles: "Cardiovascular, Piernas (trabajo ligero)",
                difficulty: "Principiante",
                instructions: [
                    "Ajusta la caminadora a 8-12% de inclinación",
                    "Camina a un ritmo cómodo (2.5–3.5 mph)",
                    "Mantén buena postura con hombros hacia atrás",
                    "5 minutos continuo"
                ],
                tips: "No te agarres de los barandales; mantén los hombros hacia atrás y el abdomen firme."
            }
        ];

        // Manejo de estado
        let progress = JSON.parse(localStorage.getItem('workout_progress')) || {};

        // Estado del temporizador global
        let globalTimerInterval = null;
        let globalTimerSeconds = parseInt(localStorage.getItem('workout_timer_seconds')) || 0;
        let globalTimerRunning = localStorage.getItem('workout_timer_running') === 'true';

        // Estado del temporizador de descanso
        let restTimerInterval = null;
        let restTimerSeconds = 0;
        let restTotalSeconds = 60;
        const REST_DURATION = 60;

        // ---- Temporizador Global ----
        function formatTime(s) {
            const m = Math.floor(s / 60).toString().padStart(2, '0');
            const sec = (s % 60).toString().padStart(2, '0');
            return `${m}:${sec}`;
        }

        function startGlobalTimer() {
            if (globalTimerRunning) return;
            globalTimerRunning = true;
            localStorage.setItem('workout_timer_running', 'true');
            globalTimerInterval = setInterval(() => {
                globalTimerSeconds++;
                localStorage.setItem('workout_timer_seconds', globalTimerSeconds);
                document.getElementById('global-timer').innerText = formatTime(globalTimerSeconds);
            }, 1000);
        }

        function stopGlobalTimer() {
            globalTimerRunning = false;
            localStorage.setItem('workout_timer_running', 'false');
            clearInterval(globalTimerInterval);
            globalTimerInterval = null;
        }

        function resetGlobalTimer() {
            stopGlobalTimer();
            globalTimerSeconds = 0;
            localStorage.setItem('workout_timer_seconds', 0);
            document.getElementById('global-timer').innerText = '00:00';
        }

        // ---- Temporizador de Descanso ----
        function startRestTimer() {
            clearInterval(restTimerInterval);
            restTimerSeconds = REST_DURATION;
            restTotalSeconds = REST_DURATION;
            updateRestTimerDisplay();
            const panel = document.getElementById('rest-timer-panel');
            panel.classList.remove('hidden');
            restTimerInterval = setInterval(() => {
                restTimerSeconds--;
                updateRestTimerDisplay();
                if (restTimerSeconds <= 0) {
                    clearInterval(restTimerInterval);
                    panel.classList.add('hidden');
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                }
            }, 1000);
        }

        function updateRestTimerDisplay() {
            document.getElementById('rest-timer-display').innerText = restTimerSeconds;
            const circumference = 163.36;
            const ratio = restTotalSeconds > 0
                ? Math.min(1, Math.max(0, restTimerSeconds / restTotalSeconds))
                : 0;
            document.getElementById('timer-circle-progress').style.strokeDashoffset =
                circumference * (1 - ratio);
        }

        function skipRestTimer() {
            clearInterval(restTimerInterval);
            document.getElementById('rest-timer-panel').classList.add('hidden');
        }

        function addRestTime(seconds) {
            restTimerSeconds += seconds;
            restTotalSeconds = Math.max(restTotalSeconds, restTimerSeconds);
            updateRestTimerDisplay();
        }

        // ---- Progreso ----
        function saveProgress() {
            localStorage.setItem('workout_progress', JSON.stringify(progress));
            updateProgressBar();
            const total = workouts.length;
            const completed = Object.values(progress).filter(Boolean).length;
            if (completed === 1) startGlobalTimer();
            if (completed === total) stopGlobalTimer();
        }

        function updateProgressBar() {
            const total = workouts.length;
            const completed = Object.values(progress).filter(Boolean).length;
            const percentage = (completed / total) * 100;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
            document.getElementById('progress-text').innerText = `${completed} / ${total}`;
        }

        function handleCheckboxChange(id, checked) {
            progress[id] = checked;
            saveProgress();
            if (checked) startRestTimer();
        }

        function toggleVideo(id) {
            document.getElementById(`video-${id}`).classList.toggle('open');
        }

        function toggleDetails(id) {
            const wrapper = document.getElementById(`details-${id}`);
            wrapper.classList.toggle('open');
            const btn = document.getElementById(`details-btn-${id}`);
            btn.innerText = wrapper.classList.contains('open') ? '▲ Ocultar detalles' : '▼ Ver detalles';
        }

        function resetProgress() {
            if (confirm("¿Estás segura que quieres reiniciar el progreso de hoy? 💕")) {
                progress = {};
                saveProgress();
                skipRestTimer();
                resetGlobalTimer();
                renderWorkouts();
            }
        }

        function renderWorkouts() {
            const container = document.getElementById('workout-list');
            container.innerHTML = '';

            workouts.forEach((workout) => {
                const isChecked = progress[workout.id] ? 'checked' : '';

                let videoHtml = '';
                let videoBtnHtml = '';

                if (workout.videoId) {
                    videoBtnHtml = `
                        <button onclick="toggleVideo('${workout.id}')"
                            class="text-sm flex items-center font-bold mt-2 transition-colors"
                            style="color:#FF69B4;"
                            onmouseover="this.style.color='#B76E79'" onmouseout="this.style.color='#FF69B4'">
                            <svg class="w-4 h-4 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                <path d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"
                                    clip-rule="evenodd" fill-rule="evenodd"></path>
                            </svg>
                            🎀 Tutorial
                        </button>
                    `;
                    videoHtml = `
                        <div id="video-${workout.id}" class="video-wrapper">
                            <div class="aspect-w-16 rounded-xl overflow-hidden" style="background:#1f2937;">
                                <iframe src="https://www.youtube.com/embed/${workout.videoId}"
                                    frameborder="0"
                                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                    allowfullscreen></iframe>
                            </div>
                        </div>
                    `;
                }

                const extraNote = workout.note
                    ? `<p class="text-xs mt-1 font-semibold" style="color:#B76E79;">${workout.note}</p>`
                    : '';

                const diffBadge = `<span class="text-xs px-2 py-0.5 rounded-full font-bold ml-2"
                    style="background:#FFE4E9; color:#B76E79;">✨ ${workout.difficulty}</span>`;

                const instructionItems = workout.instructions.map((step, i) =>
                    `<li class="text-sm mb-1" style="color:#5C3344;">
                        <span class="font-bold" style="color:#FF69B4;">${i + 1}.</span> ${step}
                    </li>`
                ).join('');

                const detailsHtml = `
                    <div id="details-${workout.id}" class="details-wrapper mt-1">
                        <div class="rounded-xl p-3 mt-2 border" style="background:#FFF5F7; border-color:#FFE0E9;">
                            <p class="text-xs font-bold mb-1" style="color:#B76E79;">💪 Músculos trabajados:</p>
                            <p class="text-sm mb-2" style="color:#5C3344;">${workout.muscles}</p>
                            <p class="text-xs font-bold mb-1" style="color:#B76E79;">📋 Instrucciones:</p>
                            <ol class="list-none pl-0 mb-2">${instructionItems}</ol>
                            <p class="text-xs font-bold mb-1" style="color:#B76E79;">💡 Tip:</p>
                            <p class="text-sm" style="color:#5C3344;">${workout.tips}</p>
                        </div>
                    </div>
                `;

                const html = `
                    <div class="p-4 md:p-5 transition-colors"
                        onmouseover="this.style.background='#FFF5F7'" onmouseout="this.style.background='white'">
                        <div class="flex items-start">
                            <div class="flex-shrink-0 pt-1">
                                <input type="checkbox" id="check-${workout.id}" ${isChecked}
                                    class="w-5 h-5 cursor-pointer rounded"
                                    style="accent-color:#FF69B4;"
                                    onchange="handleCheckboxChange('${workout.id}', this.checked);">
                            </div>
                            <div class="ml-4 flex-1">
                                <label for="check-${workout.id}" class="cursor-pointer block">
                                    <span class="text-lg font-bold block" style="color:#5C3344;">
                                        ${workout.name}${diffBadge}
                                    </span>
                                    <span class="text-sm font-semibold px-2 py-1 rounded-lg inline-block mt-1"
                                        style="background:#FFE4E9; color:#B76E79;">
                                        ${workout.sets}
                                    </span>
                                </label>
                                ${extraNote}
                                <div class="flex items-center gap-3 mt-2 flex-wrap">
                                    ${videoBtnHtml}
                                    <button id="details-btn-${workout.id}" onclick="toggleDetails('${workout.id}')"
                                        class="text-sm font-bold transition-colors"
                                        style="color:#FF85A1;"
                                        onmouseover="this.style.color='#B76E79'" onmouseout="this.style.color='#FF85A1'">
                                        ▼ Ver detalles
                                    </button>
                                </div>
                                ${detailsHtml}
                                ${videoHtml}
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += html;
            });
            updateProgressBar();
        }

        // Restaurar estado del temporizador global al recargar la página
        if (globalTimerSeconds > 0) {
            document.getElementById('global-timer').innerText = formatTime(globalTimerSeconds);
        }
        if (globalTimerRunning) {
            // Iniciar con el estado guardado; temporalmente marcamos como no corriendo
            // para que startGlobalTimer() no lo omita
            globalTimerRunning = false;
            startGlobalTimer();
        }

        // Inicializar
        renderWorkouts();
    </script>
</body>
</html>
